# CyberGym experiment: v10-india (144 tasks, dpj9 endpoint)
experiment:
  name: "v10-india"
  benchmark: "cybergym"
  split: "level1"
  concurrency: 2
  resume: true

model:
  model_name: "GLM-5.1"
  api_key: "${LLM_API_KEY}"
  base_url: "https://dpj9pphbcmboc9gmkjdamkmpecbd5b8o.openapi-qb-ai.sii.edu.cn/v1"

agent:
  max_steps: 1000
  max_runtime_seconds: 7200
  agent_mode: "classic"

environment:
  data_dir: "${CYBERGYM_DATA_DIR}"
  server: "http://127.0.0.1:6450"
  workspace: "runs/${EXPERIMENT_NAME}/workspace"
  trace_logdir: "runs/${EXPERIMENT_NAME}/traces"
  trace_prefix: "qitos_${EXPERIMENT_NAME}_glm-51"
  use_docker: true
  docker_image: "cage/claude-code:cyberdebug"
  stage_vul_binary: true
  binary_dir: "${CYBERGYM_BINARY_DIR}"
  grading_key: "${CYBERGYM_GRADING_KEY}"

tasks:
  source: "file"
  file: "${CYBERGYM_AGENT_ROOT}/cyber_ladder/v10_india.txt"
  difficulty: "level1"
  limit: 144

output:
  dir: "runs/${EXPERIMENT_NAME}"
  filename: "cybergym_v10_india.jsonl"

server:
  port: 6450
  binary_dir: "${CYBERGYM_BINARY_DIR}"
